baseURL = "https://agri.re.kr/"
title = "아시아농업농촌연구원"
theme = "PaperMod"
defaultContentLanguage = "ko"
defaultContentLanguageInSubdir = false

[params]
  ShowLanguageSwitcher = true
  disableThemeToggle = true
  [params.footer]
    hideCopyright = false
    text = "© 2026 아시아농업농촌연구원 · All rights reserved"

[languages.ko]
  languageName = "KO"
  weight = 1
  title = "아시아농업농촌연구원"
  contentDir = "content/ko"

[languages.ko.params]
  description = "아시아 농업·농촌의 지속가능한 발전을 위한 연구·네트워크 허브"
  [languages.ko.params.label]
    text = "아시아농업농촌연구원"
    icon = "/images/logo.png"
    iconHeight = 55
  [languages.ko.params.homeInfoParams]
    Title = "아시아농업농촌연구원"
    Content = "아시아 농업·농촌의 지속가능한 발전을 위한 연구·네트워크 허브"

[languages.en]
  languageName = "EN"
  weight = 2
  title = "Asia Agrarian Research Institute"
  contentDir = "content/en"

[languages.en.params]
  description = "A research and network hub for sustainable agriculture and rural development in Asia"
  [languages.en.params.label]
