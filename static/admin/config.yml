backend:
  name: github
  repo: AGR-INFO/agri-info
  branch: main

media_folder: static/images
public_folder: /images

collections:

  # ── 섹션 페이지 (한국어) ──
  - name: pages_ko
    label: "섹션 페이지 (한국어)"
    files:
      - label: "소개 페이지"
        name: about_ko
        file: content/ko/about/_index.md
        fields:
          - {label: "제목", name: title, widget: string}
          - {label: "내용", name: body, widget: markdown}
      - label: "연구 소개글"
        name: research_index_ko
        file: content/ko/research/_index.md
        fields:
          - {label: "제목", name: title, widget: string}
          - {label: "소개글", name: body, widget: markdown}
      - label: "자료 소개글"
        name: resources_index_ko
        file: content/ko/resources/_index.md
        fields:
          - {label: "제목", name: title, widget: string}
          - {label: "소개글", name: body, widget: markdown}
      - label: "구성원"
        name: members_ko
        file: content/ko/members/_index.md
        fields:
          - {label: "제목", name: title, widget: string}
          - {label: "내용", name: body, widget: markdown}
      - label: "연락처"
        name: contact_ko
        file: content/ko/contact/_index.md
        fields:
          - {label: "제목", name: title, widget: string}
          - {label: "내용", name: body, widget: markdown}

  # ── 연구 개별 항목 (한국어) ──
  - name: research_ko
    label: "연구 항목 (한국어)"
    folder: content/ko/research
    create: true
    slug: "{{year}}-{{slug}}"
    fields:
      - {label: "제목", name: title, widget: string}
      - {label: "날짜", name: date, widget: datetime, required: false}
      - {label: "대표 이미지", name: image, widget: image, required: false}
      - {label: "요약", name: description, widget: string, required: false}
      - {label: "외부 링크 (있으면 클릭 시 바로 이동)", name: externalLink, widget: string, required: false}
      - label: "연구 유형"
        name: researchType
        widget: select
        options: ["위탁연구", "자체연구", "국제연구", "기타"]
        required: false
      - {label: "배치 순서 (숫자 낮을수록 앞)", name: weight, widget: number, required: false, default: 0}
      - {label: "내용", name: body, widget: markdown, required: false}
      - {label: "임시저장", name: draft, widget: boolean, default: false}

  # ── 자료 개별 항목 (한국어) ──
  - name: resources_ko
    label: "자료 (한국어)"
    folder: content/ko/resources
    create: true
    slug: "{{year}}-{{slug}}"
    fields:
      - {label: "자료명", name: title, widget: string}
      - {label: "날짜", name: date, widget: datetime, required: false}
      - {label: "대표 이미지", name: image, widget: image, required: false}
      - {label: "요약", name: description, widget: string, required: false}
      - {label: "외부 링크 (있으면 클릭 시 바로 이동)", name: externalLink, widget: string, required: false}
      - label: "자료 유형"
        name: resourceType
        widget: select
        options: ["보고서", "논문", "정책자료", "발표자료", "기타"]
        required: false
      - {label: "배치 순서 (숫자 낮을수록 앞)", name: weight, widget: number, required: false, default: 0}
      - {label: "내용", name: body, widget: markdown, required: false}
      - {label: "임시저장", name: draft, widget: boolean, default: false}

  # ── Section Pages (English) ──
  - name: pages_en
    label: "Section Pages (English)"
    files:
      - label: "About"
        name: about_en
        file: content/en/about/_index.md
        fields:
          - {label: "Title", name: title, widget: string}
          - {label: "Content", name: body, widget: markdown}
      - label: "Research (Intro)"
        name: research_index_en
        file: content/en/research/_index.md
        fields:
          - {label: "Title", name: title, widget: string}
          - {label: "Intro", name: body, widget: markdown}
      - label: "Resources (Intro)"
        name: resources_index_en
        file: content/en/resources/_index.md
        fields:
          - {label: "Title", name: title, widget: string}
          - {label: "Intro", name: body, widget: markdown}
      - label: "Members"
        name: members_en
        file: content/en/members/_index.md
        fields:
          - {label: "Title", name: title, widget: string}
          - {label: "Content", name: body, widget: markdown}
      - label: "Contact"
        name: contact_en
        file: content/en/contact/_index.md
        fields:
          - {label: "Title", name: title, widget: string}
          - {label: "Content", name: body, widget: markdown}

  # ── Research Items (English) ──
  - name: research_en
    label: "Research Items (English)"
    folder: content/en/research
    create: true
    slug: "{{year}}-{{slug}}"
    fields:
      - {label: "Title", name: title, widget: string}
      - {label: "Date", name: date, widget: datetime, required: false}
      - {label: "Cover Image", name: image, widget: image, required: false}
      - {label: "Description", name: description, widget: string, required: false}
      - {label: "External Link (direct redirect on click)", name: externalLink, widget: string, required: false}
      - label: "Type"
        name: researchType
        widget: select
        options: ["Commissioned Research", "In-house Research", "International Research", "Other"]
        required: false
      - {label: "Order (lower = first)", name: weight, widget: number, required: false, default: 0}
      - {label: "Content", name: body, widget: markdown, required: false}
      - {label: "Draft", name: draft, widget: boolean, default: false}

  # ── Resources (English) ──
  - name: resources_en
    label: "Resources (English)"
    folder: content/en/resources
    create: true
    slug: "{{year}}-{{slug}}"
    fields:
      - {label: "Title", name: title, widget: string}
      - {label: "Date", name: date, widget: datetime, required: false}
      - {label: "Cover Image", name: image, widget: image, required: false}
      - {label: "Description", name: description, widget: string, required: false}
      - {label: "External Link (direct redirect on click)", name: externalLink, widget: string, required: false}
      - label: "Type"
        name: resourceType
        widget: select
        options: ["Report", "Paper", "Policy Document", "Presentation", "Other"]
        required: false
      - {label: "Order (lower = first)", name: weight, widget: number, required: false, default: 0}
      - {label: "Content", name: body, widget: markdown, required: false}
      - {label: "Draft", name: draft, widget: boolean, default: false}
