backend:
  name: git-gateway
  branch: main

local_backend: true

media_folder: static/images
public_folder: /images

collections:
  - name: pages_ko
    label: "페이지 (한국어)"
    files:
      - label: "소개"
        name: about
        file: content/ko/about/_index.md
        fields:
          - {label: "제목", name: title, widget: string}
          - {label: "내용", name: body, widget: markdown}
      - label: "연구"
        name: research
        file: content/ko/research/_index.md
        fields:
          - {label: "제목", name: title, widget: string}
          - {label: "내용", name: body, widget: markdown}
      - label: "자료"
        name: resources
        file: content/ko/resources/_index.md
        fields:
          - {label: "제목", name: title, widget: string}
          - {label: "내용", name: body, widget: markdown}
      - label: "구성원"
        name: members
        file: content/ko/members/_index.md
        fields:
          - {label: "제목", name: title, widget: string}
          - {label: "내용", name: body, widget: markdown}
      - label: "연락처"
        name: contact
        file: content/ko/contact/_index.md
        fields:
          - {label: "제목", name: title, widget: string}
          - {label: "내용", name: body, widget: markdown}
  - name: pages_en
    label: "Pages (English)"
    files:
      - label: "About"
        name: about_en
        file: content/en/about/_index.md
        fields:
          - {label: "Title", name: title, widget: string}
          - {label: "Content", name: body, widget: markdown}
      - label: "Research"
        name: research_en
        file: content/en/research/_index.md
        fields:
          - {label: "Title", name: title, widget: string}
          - {label: "Content", name: body, widget: markdown}
      - label: "Resources"
        name: resources_en
        file: content/en/resources/_index.md
        fields:
          - {label: "Title", name: title, widget: string}
          - {label: "Content", name: body, widget: markdown}
      - label: "Members"
        name: members_en
        file: content/en/members/_index.md
        fields:
          - {label: "Title", name: title, widget: string}
          - {label: "Content", name: body, widget: markdown}
      - label: "Contact"
        name: contact_en
        file: content/en/contact/_index.md
        fields:
          - {label: "Title", name: title, widget: string}
          - {label: "Content", name: body, widget: markdown}