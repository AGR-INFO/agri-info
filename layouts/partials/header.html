{{- $currentLang := .Language.Lang }}
<header class="agri-header">

  <div class="agri-topbar">
    {{- range .Site.Home.AllTranslations }}
    <a href="{{ .Permalink }}" class="agri-lang-btn{{ if eq .Language.Lang $currentLang }} active{{ end }}">
      {{- .Language.LanguageName -}}
    </a>
    {{- end }}
  </div>

  <div class="agri-line"></div>

  <div class="agri-brand">
    <a href="{{ .Site.Home.RelPermalink }}" accesskey="h">
      <img class="logo-teal" src="/images/logo.png" height="{{ .Site.Params.label.iconHeight | default 50 }}" alt="">
      <span class="brand-name">{{ .Site.Params.label.text | default .Site.Title }}</span>
      <img class="logo-gold" src="/images/logo-gold.png" height="{{ .Site.Params.label.iconHeight | default 50 }}" alt="">
    </a>
  </div>

  <div class="agri-line"></div>

  <nav class="agri-nav">
    <ul>
      {{- $currentPage := . }}
      {{- range .Site.Menus.main }}
      <li>
        <a href="{{ .URL }}"{{ if $currentPage.IsMenuCurrent "main" . }} class="active"{{ end }}>
          {{- .Name -}}
        </a>
      </li>
      {{- end }}
    </ul>
  </nav>

</header>
